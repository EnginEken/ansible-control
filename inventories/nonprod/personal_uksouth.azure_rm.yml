---
plugin: azure.azcollection.azure_rm
auth_source: msi
subscription_id: 7f78c076-980b-423d-8b57-7fff00b206f8
plain_host_names: true

default_host_filters: []

include_vm_resource_groups:
  - "*"

include_host_filters:
  - location in ['uksouth'] and powerstate == 'running' and provisioning_state == 'succeeded'

keyed_groups:
  - prefix: subscription
    key: tags.subscription_alias | default('unknown')
  - prefix: env
    key: tags.environment | default('unknown')
  - prefix: workload
    key: tags.workload | default('unknown')
  - prefix: service
    key: tags.service | default('unknown')
  - prefix: app
    key: tags.application | default('unknown')
  - prefix: region
    key: location
  - prefix: os
    key: os_profile.system | default('unknown')
  - prefix: sync
    key: tags.sync_enabled | default('false')

conditional_groups:
  windows: (os_profile.system | default('') | lower) == 'windows'
  linux: (os_profile.system | default('') | lower) == 'linux'
  managed: tags.sync_enabled | default('false') == 'true'

compose:
  ansible_host: >-
    ((tags.connection_fqdn | default('')) if ((os_profile.system | default('') | lower) == 'windows') else (private_ipv4_addresses[0] | default(private_ip_address)))

hostnames:
  - computer_name
  - name
